<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <base href="/albaranes-pwa/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Carga de Cemento</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <script>navigator.serviceWorker.register("service-worker.js")</script>
  <meta name="theme-color" content="#2c3e50">
</head>

<body>
  <!-- Cabecera con título y botones de navegación -->
  <header class="app-header">
    <button id="btnBack" class="btn-back" style="display: none;">←</button>
    <h1 class="app-title">Carga de Cemento</h1>
    <div id="menuAcciones" class="menu-acciones" style="display: none;">
      <button id="btnMenuAcciones" class="btn-menu">⋮</button>
      <div id="dropdownMenu" class="dropdown-content">
        <button id="btnEditarCargaMenu">✏️ Editar carga prevista</button>
        <button id="btnFinalizarCargaMenu">🏁 Finalizar carga</button>
      </div>
    </div>
  </header>

  <!-- Pantalla 1: Lista de barcos -->
  <div id="pantallaLista" class="pantalla">
    <div class="content">
      <h2>Barcos activos</h2>
      <div id="listaBarcosActivos"></div>
      <h2>Histórico</h2>
      <div id="listaBarcosCompletados"></div>
    </div>
  </div>

  <!-- Pantalla 2: Formulario nuevo barco -->
  <div id="pantallaNuevoBarco" class="pantalla" style="display:none;">
    <div class="content">
      <h2>Nuevo barco</h2>
      <form id="formNuevoBarco">
        <input type="text" id="nombreBarco" placeholder="Nombre del barco" required>
        <input type="number" id="cargaTotal" step="any" placeholder="Carga total prevista (toneladas)">
        <button type="submit">Crear y empezar carga</button>
      </form>
    </div>
  </div>

  <!-- Pantalla 3: Detalle de barco activo -->
  <div id="pantallaDetalle" class="pantalla" style="display:none;">
    <div class="content">
      <div id="resumenBarco" class="resumen"></div>

      <!-- Lista de albaranes -->
      <h3>Albaranes</h3>
      <ul id="listaAlbaranesBarco"></ul>
    </div>

    <!-- Botón flotante para añadir albarán (FAB) -->
    <button id="fabNuevoAlbaran" class="fab">+</button>
  </div>

  <!-- Barra de navegación inferior -->
  <nav class="bottom-nav">
    <button id="navBarcos" class="nav-item active">📋 Barcos</button>
    <button id="navNuevoBarco" class="nav-item">➕ Nuevo</button>
  </nav>

  <!-- Diálogo/modal para capturar foto/OCR (podría estar oculto inicialmente) -->
  <div id="modalAlbaran" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h3>Nuevo albarán</h3>
      <div class="camera-section">
        <button id="btnFotoModal">📷 Sacar foto</button>
        <button id="btnCargarImagenModal" class="secondary">🖼️ Cargar imagen</button>
        <div id="previewModal" class="preview"></div>
      </div>
      <form id="albaranFormModal">
        <input type="text" id="matriculaModal" placeholder="Matrícula" required>
        <input type="number" id="pesoModal" step="any" placeholder="Peso neto (toneladas)" required>
        <button type="submit">✅ Guardar albarán</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="js/db.js"></script>
  <script src="js/barco.js"></script>
  <script src="js/ocr.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
