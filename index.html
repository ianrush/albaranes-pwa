<head>
  <meta charset="UTF-8">
  <base href="/albaranes-pwa/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Albaranes PWA</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <script>navigator.serviceWorker.register("service-worker.js")</script>
  <meta name="theme-color" content="#2c3e50">

<body>
  <div class="container">
    <!-- Cabecera común -->
    <h1>📊 Gestor de Carga de Barcos</h1>

    <!-- Pantalla 1: Lista de barcos -->
    <div id="pantallaLista" class="pantalla">
      <button id="btnNuevoBarco">➕ Nuevo barco</button>
      <h2>Barcos activos</h2>
      <div id="listaBarcosActivos"></div>
      <h2>Histórico</h2>
      <div id="listaBarcosCompletados"></div>
    </div>

    <!-- Pantalla 2: Formulario nuevo barco -->
    <div id="pantallaNuevoBarco" class="pantalla" style="display:none;">
      <button class="btnVolver">◀ Volver</button>
      <h2>Nuevo barco</h2>
      <form id="formNuevoBarco">
        <input type="text" id="nombreBarco" placeholder="Nombre del barco" required>
        <input type="number" id="cargaTotal" step="any" placeholder="Carga total prevista (toneladas)">
        <button type="submit">Crear y empezar carga</button>
      </form>
    </div>

    <!-- Pantalla 3: Detalle de barco activo (incluye captura de albaranes) -->
    <div id="pantallaDetalle" class="pantalla" style="display:none;">
      <button class="btnVolver">◀ Volver</button>
      <h2 id="detalleNombreBarco"></h2>

      <!-- Tarjeta de resumen con acciones -->
      <div class="resumen-card">
        <div id="resumenBarco" class="resumen-contenido"></div>
        <div class="acciones-rapidas">
          <button id="btnEditarCarga" class="btn-editar">✏️ Editar carga prevista</button>
          <button id="btnFinalizarCarga" class="btn-finalizar">🏁 Marcar como completada</button>
        </div>
      </div>

      <!-- Sección de captura (colapsable o siempre visible) -->
      <div class="captura-section">
        <div class="section-header">
          <span>📸 Añadir albarán</span>
        </div>
        <div class="camera-actions">
          <button id="btnFotoDetalle" class="btn-camara">📷 Tomar foto</button>
          <button id="btnCargarImagenDetalle" class="btn-galeria">🖼️ Cargar imagen</button>
        </div>
        <div id="preview" class="preview"></div>
        <form id="albaranFormDetalle" class="form-albaran">
          <input type="text" id="matricula" placeholder="Matrícula" required>
          <input type="number" id="peso" step="any" placeholder="Peso neto (toneladas)" required>
          <button type="submit">💾 Guardar albarán</button>
        </form>
      </div>

      <!-- Lista de albaranes -->
      <div class="lista-section">
        <div class="section-header">
          <span>📋 Albaranes cargados</span>
        </div>
        <ul id="listaAlbaranesBarco"></ul>
      </div>
    </div>
